<p-toolbar class="p-2">
    <div class="toolbar-content">
        <div class="toolbar-left">
            <p-button styleClass="btn-acao btn-reset" severity="warn" icon="pi pi-refresh" iconPos="left"
                title="Ir para o Mês atual" (onClick)="setRangeDates()"></p-button>
            <p-button styleClass="btn-acao btn-navegacao" severity="info" icon="pi pi-download" iconPos="left"
                title="Gerar horas consilidadas e copiar para a area de transferencia" (onClick)="gerarHorasConsolidadas()"></p-button>
            <p-button styleClass="btn-acao btn-novo-gasto" icon="pi pi-plus" severity="success"
                (onClick)="novaDemanda()" title="Cadastrar nova demanda."></p-button>
        </div>

        <div class="toolbar-left-middle">
            <input pInputText class="texto-input" [(ngModel)]="textoBusca" (keyup.enter)="buscar()">
            <p-button styleClass="btn-acao btn-navegacao" icon="pi pi-search" severity="info"
                (onClick)="buscar()" title="Buscar demandas"></p-button>
        </div>

        <div class="toolbar-middle">
            <p-button styleClass="btn-acao btn-navegacao" icon="pi pi-arrow-left" severity="info"
                (onClick)="prevMonth()" title="Mês Anterior"></p-button>
            <div class="label-mes-atual">{{ mesAtual }}</div>
            <p-button styleClass="btn-acao btn-navegacao" icon="pi pi-arrow-right" severity="info"
                (onClick)="nextMonth()" title="Mês Posterior"></p-button>
        </div>

        <div class="toolbar-middle-right">
            
        </div>

        <div class="toolbar-right">
            <p-button styleClass="btn-acao btn-logout" severity="danger" icon="pi pi-sign-out" iconPos="left"
                title="Logout" (onClick)="logout()"></p-button>
        </div>
    </div>
</p-toolbar>

<dialog-cadastrar-demanda #dialogCadastrarDemanda (onCadastrarDemanda)="cadastrarDemanda($event)"></dialog-cadastrar-demanda>
<p-toast position="top-right"></p-toast>
